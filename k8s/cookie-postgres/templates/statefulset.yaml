apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cookie-postgres
spec:
  selector:
    matchLabels:
      app: cookie-postgres
  serviceName: cookie-postgres
  replicas: 1
  template:
    metadata:
      labels:
        app: cookie-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: cookie-postgres-secret
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cookie-postgres-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cookie-postgres-secret
                  key: password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cookie-postgres-pvc
