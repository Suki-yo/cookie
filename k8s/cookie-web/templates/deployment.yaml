apiVersion: apps/v1
kind: Deployment
metadata:
  name: cookie-web
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: cookie-web
  template:
    metadata:
      labels:
        app: cookie-web
    spec:
      containers:
        - name: cookie-web
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          ports:
            - containerPort: {{ .Values.service.port }}
