services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cookie
      POSTGRES_USER: cookie
      POSTGRES_PASSWORD: cookie
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookie -d cookie"]
      interval: 5s
      timeout: 5s
      retries: 10

  cookie-api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: cookie
      PGUSER: cookie
      PGPASSWORD: cookie
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - cookie-api

volumes:
  postgres_data:
